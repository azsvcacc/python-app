name: Hello World Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  hello:
    runs-on: self-hosted-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print Hello World
        run: |
             echo "Hello World from GitHub Actions 🚀"
             sudo docker info
             sudo docker ps -a
        
